<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Card Arbitrage Filter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; }
  header { background: #1a1a2e; padding: 16px 24px; border-bottom: 2px solid #e63946; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1.2rem; color: #fff; }
  .controls { padding: 16px 24px; background: #1a1a2e; border-bottom: 1px solid #2a2a4a; dihsplay: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .controls input[type=number], .controls select { background: #0f0f1a; border: 1px solid #2a2a4a; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; }
  .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
  .ctrl-group label { font-size: 0.8rem; color: #aaa; }
  .btn { background: #e63946; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: background 0.2s; }
  .btn:hover { background: #c1121f; }
  .btn:disabled { background: #444; cursor: not-allowed; }
  .btn.secondary { background: #2a2a4a; }
  .btn.secondary:hover { background: #3a3a6a; }
  .status { padding: 12px 24px; font-size: 0.85rem; color: #aaa; background: #13131f; border-bottom: 1px solid #1a1a2e; min-height: 38px; }
  .status.running { color: #f4a261; }
  .status.done { color: #2a9d8f; }
  .status.error { color: #e63946; }
  #debugPanel { display:none; padding:12px 24px; background:#0a0a14; border-bottom:1px solid #2a2a4a; font-size:0.78rem; font-family:monospace; color:#aaa; white-space:pre-wrap; max-height:200px; overflow-y:auto; }
  .summary-bar { display:none; padding:10px 24px; background:#13131f; border-bottom:1px solid #1a1a2e; font-size:0.82rem; color:#888; gap:20px; flex-wrap:wrap; }
  .summary-bar strong { color:#2a9d8f; }
  .results { padding:20px 24px; display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .empty { text-align:center; padding:60px 24px; color:#555; grid-column:1/-1; }
  .empty .icon { font-size:3rem; margin-bottom:12px; }
  .card { background:#1a1a2e; border-radius:12px; border:1px solid #2a2a4a; overflow:hidden; transition:transform 0.15s,border-color 0.15s; }
  .card:hover { transform:translateY(-2px); border-color:#e63946; }
  .card img { width:100%; height:180px; object-fit:cover; background:#0f0f1a; }
  .card-body { padding:14px; }
  .card-title { font-size:0.88rem; color:#ddd; margin-bottom:10px; line-height:1.4; }
  .badges { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .badge { font-size:0.75rem; padding:3px 8px; border-radius:20px; font-weight:600; }
  .badge.bulk { background:#e6394622; color:#e63946; border:1px solid #e6394655; }
  .badge.graded { background:#f4a26122; color:#f4a261; border:1px solid #f4a26155; }
  .badge.sealed { background:#48cae422; color:#48cae4; border:1px solid #48cae455; }
  .badge.nonenglish { background:#a8dadc22; color:#a8dadc; border:1px solid #a8dadc55; }
  .badge.holo { background:#c77dff33; color:#c77dff; border:1px solid #c77dff77; }
  .badge.mixed { background:#e9c46a22; color:#e9c46a; border:1px solid #e9c46a55; }
  .badge.ai { background:#9b5de522; color:#c77dff; border:1px solid #9b5de555; }
  .badge.buynow { background:#2a9d8f33; color:#2a9d8f; border:1px solid #2a9d8f77; font-weight:700; }
  .badge.makeoffer { background:#f4a26133; color:#f4a261; border:1px solid #f4a26177; font-weight:700; }
  .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
  .stat { background:#0f0f1a; border-radius:8px; padding:8px 10px; }
  .stat-label { font-size:0.7rem; color:#888; margin-bottom:2px; }
  .stat-value { font-size:1rem; font-weight:700; color:#fff; }
  .stat-value.green { color:#2a9d8f; }
  .stat-value.yellow { color:#f4a261; }
  .composition { background:#0f0f1a; border-radius:8px; padding:10px; margin-bottom:12px; font-size:0.78rem; color:#aaa; }
  .composition strong { color:#e9c46a; display:block; margin-bottom:6px; font-size:0.8rem; }
  .comp-row { display:flex; justify-content:space-between; padding:2px 0; border-bottom:1px solid #1a1a2e; }
  .comp-row:last-child { border-bottom:none; }
  .comp-row span:last-child { color:#fff; font-weight:600; }
  a.view-btn { display:block; text-align:center; background:#e63946; color:#fff; padding:9px; border-radius:8px; text-decoration:none; font-size:0.85rem; font-weight:600; transition:background 0.2s; }
  a.view-btn:hover { background:#c1121f; }
</style>
</head>
<body>

<header>
  <span>🎴</span>
  <h1>Pokemon WOTC Arbitrage Filter</h1>
</header>

<div class="controls">
  <div class="ctrl-group">
    <label>Bulk max $/card</label>
    <input type="number" id="maxBulk" value="0.20" step="0.01" min="0.01" style="width:80px">
  </div>
  <div class="ctrl-group">
    <label>Non-English max $/card</label>
    <input type="number" id="maxForeign" value="0.10" step="0.01" min="0.01" style="width:80px">
  </div>
  <div class="ctrl-group">
    <label>Holo max $/card</label>
    <input type="number" id="maxHolo" value="0.50" step="0.05" min="0.01" style="width:80px">
  </div>
  <div class="ctrl-group">
    <label>Graded max % of market</label>
    <input type="number" id="gradedPct" value="50" step="5" min="10" max="90" style="width:70px">
  </div>
  <div class="ctrl-group">
    <label>Results per term</label>
    <select id="perPage">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="200">200</option>
    </select>
  </div>
  <button class="btn" id="runBtn" onclick="runFilter()">🔍 Run Filter</button>
  <button class="btn secondary" onclick="toggleDebug()">🐛 Debug</button>
</div>

<div class="status" id="status">Ready. Click "Run Filter" to scan eBay listings.</div>
<div id="debugPanel"></div>
<div class="summary-bar" id="summaryBar"></div>
<div class="results" id="results">
  <div class="empty"><div class="icon">🎴</div><p>No results yet. Click Run Filter to start.</p></div>
</div>

<script>
const API = "/.netlify/functions/ebay";

const SEARCH_TERMS = [
  "vintage pokemon lot","vintage pokemon bulk","WOTC pokemon bulk",
  "pokemon lot WOTC","pokemon cards lot vintage","base set pokemon lot",
  "pokemon bulk lot","pokemon card collection lot",
  "pomekon cards lot","pokeman cards lot","pokamon cards lot",
  "pokemons cards lot","pokemom cards lot","pokmen cards lot",
  "pokmon cards lot","poekmon cards lot","pokimon cards lot",
  "pokmeon cards lot","pocemon cards lot","pokamon bulk lot",
  "pokeman bulk lot","vintag pokemon lot","vintge pokemon lot",
  "vinatge pokemon lot","wotc pokeman","wotc pokamon",
  "wizards coast pokemon lot","pokemon bluk lot","pokemon buld lot",
  "poke cards lot","poke card bulk","poke mon cards lot"
];

const WOTC_SETS = ["base set","jungle","fossil","team rocket","gym heroes","gym challenge",
  "neo genesis","neo discovery","neo revelation","neo destiny","southern islands",
  "legendary collection","wizards","wotc","1999","2000","2001","shadowless"];
const GRADED_KW  = ["psa","bgs","cgc","ace","sgc","graded","slab","slabbed"];
const SEALED_KW  = ["sealed","booster box","booster pack","factory sealed","tin","etb",
  "elite trainer box","theme deck","starter deck","blister","booster bundle","unopened"];
const HOLO_KW    = ["holo","holos","holographic","holofoil","holo rare"];
const FOREIGN_KW = ["japanese","french","german","spanish","italian","korean","chinese",
  "portuguese","polish","foreign","non-english","international","jpn"];

const has = (t, kws) => kws.some(k => t.includes(k));
const isGraded  = t => has(t.toLowerCase(), GRADED_KW);
const isSealed  = t => has(t.toLowerCase(), SEALED_KW);
const isHolo    = t => has(t.toLowerCase(), HOLO_KW);
const isForeign = t => has(t.toLowerCase(), FOREIGN_KW);
const isWOTC    = t => has(t.toLowerCase(), WOTC_SETS) || t.toLowerCase().includes("vintage") || t.toLowerCase().includes("wotc");

const HIDDEN_KEY = "pf_hidden";function getHidden() { try { return new Set(JSON.parse(localStorage.getItem(HIDDEN_KEY)||"[]")); } catch { return new Set(); } }
  function hideItem(id) { const h = getHidden(); h.add(String(id)); localStorage.setItem(HIDDEN_KEY, JSON.stringify([...h])); const el = document.getElementById("card-"+id); if (el) el.remove(); } function dbg(msg) { const p = document.getElementById("debugPanel");
  p.textContent += msg + "\n";
  console.log(msg);
}
function toggleDebug() {
  const p = document.getElementById("debugPanel");
  p.style.display = p.style.display === "none" ? "block" : "none";
}
function setStatus(msg, cls="") {
  const el = document.getElementById("status");
  el.textContent = msg; el.className = "status " + cls;
}

const YEAR_RE = /^(19|20)\d{2}$/;

function extractCount(text) {
  const t = (text||"").toLowerCase();
  const patterns = [
    /(\d{2,4})\s*\+?\s*cards?/i,/lot\s+of\s+(\d{2,4})/i,/(\d{2,4})\s*ct\b/i,
    /(\d{2,4})\s*count/i,/(\d{2,4})\s*\+?\s*mixed/i,/(\d{2,4})\s*\+?\s*pokemon/i,
    /(\d{2,4})\s*\+?\s*vintage/i,/(\d{2,4})\s*\+?\s*bulk/i,/bulk\s+of\s+(\d{2,4})/i,
    /approx\w*\s+(\d{2,4})/i,/~\s*(\d{2,4})/i,
  ];
  for (const p of patterns) {
    const m = t.match(p);
    if (m) {
      const n = parseInt(m[1]);
      if (YEAR_RE.test(m[1])) continue; // skip years like 1999, 2000
      if (n >= 5 && n <= 10000) return n;
    }
  }
  return null;
}

async function ebaySearch(keywords, perPage) {
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ type: "search", keywords, perPage })
  });
  return res.json();
}

async function ebaySold(keywords) {
  const res = await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ type: "sold", keywords })
  });
  return res.json();
}

async function aiCount(imgUrl, title) {
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514", max_tokens: 50,
        messages: [{ role: "user", content: [
          { type: "image", source: { type: "url", url: imgUrl } },
          { type: "text", text: `eBay listing: "${title}". Estimate total Pokemon card count. Reply ONE integer only.` }
        ]}]
      })
    });
    const d = await resp.json();
    const n = parseInt((d?.content?.[0]?.text||"0").replace(/\D/g,""));
    return n > 0 ? n : null;
  } catch { return null; }
}

async function aiComposition(imgUrl, title, totalCount, rates) {
  try {
    const prompt = `You are analyzing an eBay Pokemon card lot.
Title: "${title}"
Total cards: ${totalCount}
Return ONLY JSON with keys: holos, foreign, graded, bulk (integers summing to ${totalCount}), reasoning (string).`;
    const content = imgUrl
      ? [{ type:"image", source:{ type:"url", url:imgUrl } }, { type:"text", text:prompt }]
      : [{ type:"text", text:prompt }];
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300, messages:[{ role:"user", content }] })
    });
    const d = await resp.json();
    const txt = (d?.content?.[0]?.text||"").replace(/```json|```/g,"").trim();
    const parsed = JSON.parse(txt);
    const sum = (parsed.holos||0)+(parsed.foreign||0)+(parsed.graded||0)+(parsed.bulk||0);
    if (sum !== totalCount) parsed.bulk = (parsed.bulk||0) + (totalCount - sum);
    return parsed;
  } catch { return null; }
}

async function runFilter() {
  const rates = {
    bulk:    parseFloat(document.getElementById("maxBulk").value)||0.20,
    foreign: parseFloat(document.getElementById("maxForeign").value)||0.10,
    holo:    parseFloat(document.getElementById("maxHolo").value)||0.50,
  };
  const gradedPct = (parseFloat(document.getElementById("gradedPct").value)||50)/100;
  const perPage   = parseInt(document.getElementById("perPage").value)||100;
  const taxRate   = 0.08;

  document.getElementById("runBtn").disabled = true;
  document.getElementById("debugPanel").textContent = "";
  document.getElementById("summaryBar").style.display = "none";
  document.getElementById("results").innerHTML = `<div class="empty"><div class="icon">⏳</div><p>Scanning eBay...</p></div>`;

  const seen = new Set(), passing = [];
  let totalFetched = 0, aiUsed = 0;
  const drop = { noWOTC:0, noCount:0, tooExpensive:0 };

  for (let i = 0; i < SEARCH_TERMS.length; i++) {
    const term = SEARCH_TERMS[i];
    setStatus(`🔍 "${term}" (${i+1}/${SEARCH_TERMS.length})...`, "running");
    try {
      const data = await ebaySearch(term, perPage);
      if (data.error) { dbg(`ERROR ${term}: ${data.error} ${JSON.stringify(data.detail||"")}`); continue; }
      const items = data.itemSummaries || [];
      totalFetched += items.length;
      dbg(`"${term}" → ${items.length} items`);

      for (const item of items) {
        const id = item.itemId;
        if (!id || seen.has(id)) continue;
        seen.add(id); if (getHidden().has(String(id))) continue;

        const title = item.title||"";
        if (!isWOTC(title)) { drop.noWOTC++; continue; }        if (title.toLowerCase().includes("modern")) { drop.noWOTC++; continue; }        if ((item.itemLocation?.country||"").toUpperCase() !== "US") { drop.noWOTC++; continue; }        if ((item.quantity||1) > 1) { drop.noWOTC++; continue; }

        const buyingOptions = item.buyingOptions||[];
        const isFixed   = buyingOptions.includes("FIXED_PRICE");
        const hasBestOffer = buyingOptions.includes("BEST_OFFER");
        if (!isFixed) continue;

        const priceVal  = parseFloat(item.price?.value||0);
        const shipping  = parseFloat(item.shippingOptions?.[0]?.shippingCost?.value||4.99);
        const totalCost = (priceVal + shipping) * (1 + taxRate);
        const imgUrl    = item.image?.imageUrl||"";
        const viewUrl   = item.itemWebUrl||"";

        // Graded
        if (isGraded(title)) {
          const kind = "graded";
          setStatus(`${💎 Checking market rate...`, "running");
          const soldData = await ebaySold(title.substring(0,60));
          const soldItems = soldData.itemSummaries||[];
          const prices = soldItems.map(s=>parseFloat(s.price?.value||0)).filter(p=>p>0);
          const marketRate = prices.length ? prices.reduce((a,b)=>a+b,0)/prices.length : null;
          if (marketRate && totalCost <= marketRate * gradedPct) {
            passing.push({ id, title, priceVal, shipping, totalCost, imgUrl, viewUrl,
              type:kind, cpc:null, cardCount:null, countSource:"n/a",
              marketRate, savings:Math.round((1-totalCost/marketRate)*100),
              action:"buy", suggestedOffer:null, composition:null });
          }
          continue;
        }

        // Card count
        let cardCount = extractCount(title);
        let countSource = "text";
        if (!cardCount && imgUrl) {
          setStatus(`🤖 AI counting cards...`, "running");
          cardCount = await aiCount(imgUrl, title);
          if (cardCount) { countSource = "ai"; aiUsed++; }
        }
        if (!cardCount) { drop.noCount++; continue; }

        // Composition for mixed lots
        const hasHolo = isHolo(title), hasForeign = isForeign(title);
        const isMixed = hasHolo || hasForeign;
        let composition = null, blendedThreshold = null;

        if (isMixed) {
          setStatus(`🤖 AI analyzing composition...`, "running");
          composition = await aiComposition(imgUrl, title, cardCount, rates);
          aiUsed++;
          if (composition) {
            const { holos=0, foreign=0, graded=0, bulk=0 } = composition;
            blendedThreshold = ((holos*rates.holo)+(foreign*rates.foreign)+(graded*rates.holo)+(bulk*rates.bulk)) / cardCount;
          }
        }

        const threshold      = blendedThreshold || (hasHolo ? rates.holo : hasForeign ? rates.foreign : rates.bulk);
        const thresholdOffer = threshold * 2;
        const cpc            = totalCost / cardCount;

        const qualifiesBuy   = isFixed      && cpc <= threshold;
        const qualifiesOffer = hasBestOffer  && cpc <= thresholdOffer;
        if (!qualifiesBuy && !qualifiesOffer) { drop.tooExpensive++; continue; }

        const action = qualifiesBuy ? "buy" : "offer";
        const suggestedOffer = action==="offer"
          ? Math.max(0, (threshold * cardCount / (1+taxRate)) - shipping).toFixed(2)
          : null;

        passing.push({ id, title, priceVal, shipping, totalCost, imgUrl, viewUrl,
          type: isMixed?"mixed":hasHolo?"holo":hasForeign?"foreign":"bulk",
          cpc, cardCount, countSource, marketRate:null,
          action, suggestedOffer, composition,
          blendedThreshold: blendedThreshold?blendedThreshold.toFixed(3):null,
          holo:hasHolo, foreign:hasForeign });
      }
    } catch(e) { dbg(`ERROR: ${term} → ${e.message}`); }
  }

  dbg(`\nDone. Fetched:${totalFetched} noWOTC:${drop.noWOTC} noCount:${drop.noCount} tooExpensive:${drop.tooExpensive} passing:${passing.length}`);
  setStatus(`✅ Done — ${passing.length} deals from ${totalFetched} listings (${aiUsed} AI calls)`, "done");
  document.getElementById("runBtn").disabled = false;

  if (!passing.length) {
    document.getElementById("results").innerHTML = `<div class="empty"><div class="icon">😔</div><p>No deals found. Check debug panel for details.</p></div>`;
    return;
  }

  passing.sort((a,b)=>(a.cpc||0)-(b.cpc||0));

  const sb = document.getElementById("summaryBar");
  sb.style.display = "flex";
  sb.innerHTML = `<span>Scanned: <strong>${totalFetched}</strong></span><span>Deals: <strong>${passing.length}</strong></span><span>AI calls: <strong>${aiUsed}</strong></span><span>Best: <strong>${passing[0]?.cpc?"$"+passing[0].cpc.toFixed(3)+"/card":passing[0]?.savings+"% below market"}</strong></span>`;

  const typeLabels = { graded:"Graded",sealed:"Sealed",mixed:"Mixed Lot",holo:"Holos",foreign:"Non-English",bulk:"WOTC Bulk" };
  const typeBadges = { graded:"graded",sealed:"sealed",mixed:"mixed",holo:"holo",foreign:"nonenglish",bulk:"bulk" };

  document.getElementById("results").innerHTML = passing.map(item => {
    const cpcDisplay  = item.cpc ? `$${item.cpc.toFixed(3)}/card` : `${item.savings}% below market`;
    const cpcClass    = !item.cpc?"green":item.cpc<0.10?"green":"yellow";
    const countDisplay= item.type==="graded"?"1 (graded)":item.type==="sealed"?"Sealed":`~${item.cardCount?.toLocaleString()}`;

    const compHTML = item.composition ? `
      <div class="composition">
        <strong>🔬 AI Composition (blended: $${item.blendedThreshold}/card)</strong>
        ${item.composition.holos>0?`<div class="comp-row"><span>🌟 Holos</span><span>${item.composition.holos} @ $${rates.holo}/ea</span></div>`:""}
        ${item.composition.foreign>0?`<div class="comp-row"><span>🌏 Non-English</span><span>${item.composition.foreign} @ $${rates.foreign}/ea</span></div>`:""}
        ${item.composition.graded>0?`<div class="comp-row"><span>💎 Graded</span><span>${item.composition.graded} slabs</span></div>`:""}
        ${item.composition.bulk>0?`<div class="comp-row"><span>📦 Bulk</span><span>${item.composition.bulk} @ $${rates.bulk}/ea</span></div>`:""}
        ${item.composition.reasoning?`<div style="margin-top:6px;font-style:italic;color:#666">${item.composition.reasoning}</div>`:""}
      </div>` : "";

    const marketHTML = item.marketRate ? `
      <div class="stat"><div class="stat-label">Avg Market</div><div class="stat-value">$${item.marketRate.toFixed(2)}</div></div>
      <div class="stat"><div class="stat-label">You Save</div><div class="stat-value green">${item.savings}% below</div></div>` : "";

    const offerHTML = item.action==="offer" ? `
      <div class="stat" style="grid-column:1/-1;background:#f4a26115;border:1px solid #f4a26133">
        <div class="stat-label">💡 Suggested Offer</div>
        <div class="stat-value yellow">$${item.suggestedOffer}</div>
      </div>` : "";

    return `<div class="card" id="card-${item.id}">
      ${item.imgUrl?`<img src="${item.imgUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`:""}
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px"><div class="card-title" style="margin-bottom:0;flex:1">${item.title}</div><button onclick="hideItem('${item.id}')" title="Never show again" style="flex-shrink:0;background:none;border:none;cursor:pointer;font-size:1rem;color:#555;padding:0 2px;line-height:1" onmouseover="this.style.color='#e63946'" onmouseout="this.style.color='#555'">✕</button></div>
        <div class="badges">
          <span class="badge ${typeBadges[item.type]}">${typeLabels[item.type]}</span>
          ${item.action==="buy"?`<span class="badge buynow">🟢 Buy Now</span>`:`<span class="badge makeoffer">🟡 Make Offer</span>`}
          ${item.countSource==="ai"?`<span class="badge ai">🤖 AI count</span>`:""}
        </div>
        ${compHTML}
        <div class="stats">
          <div class="stat"><div class="stat-label">Cost Per Card</div><div class="stat-value ${cpcClass}">${cpcDisplay}</div></div>
          <div class="stat"><div class="stat-label">Card Count</div><div class="stat-value">${countDisplay}</div></div>
          <div class="stat"><div class="stat-label">Total Cost</div><div class="stat-value">$${item.totalCost.toFixed(2)}</div></div>
          <div class="stat"><div class="stat-label">Listed Price</div><div class="stat-value">$${item.priceVal.toFixed(2)}</div></div>
          ${marketHTML}${offerHTML}
        </div>
        <a class="view-btn" href="${item.viewUrl}" target="_blank">View on eBay →</a>
      </div>
    </div>`;
  }).join("");
}
</script>
</body>
</html>
